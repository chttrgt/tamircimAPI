services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tamircim-api
    ports:
      - "5001:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173;http://localhost:3000}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      # Görseller container içinde /app/uploads'a yazılır. Bind mount olmadan
      # her `up --build`/`down` sonrası dosyalar silinir, DB kayıtları kalır →
      # liste gelir ama resimler 404 olur. Bu mount dosyaları kalıcı kılar.
      - ./uploads:/app/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: tamircim-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-TamircimDB}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --lc-collate=C --lc-ctype=C
      - LANG=C.UTF-8
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Şema artık EF Core migration'larıyla (API açılışında Database.Migrate())
      # kurulur — Postgres boş başlar. init-db mount'u kaldırıldı.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
